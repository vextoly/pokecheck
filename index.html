<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vextoly Pokécheck</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #d1d1d1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            margin-top: 40px;
        }
        h1 {
            font-weight: 300;
            font-size: 24px;
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        h1:hover { color: #58a6ff; }
        .description {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 50px;
            align-items: flex-start;
        }
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #58a6ff; }
        
        .suggestions-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 10;
            display: none;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .suggestion-item {
            padding: 10px 12px;
            cursor: pointer;
            color: #d1d1d1;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.active {
            background: #333;
            color: #fff;
        }
        .suggestion-num { color: #888; font-size: 12px; }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            background: #444;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #555; }

        .error-msg { color: #ff6b6b; text-align: center; margin-top: 20px; }
        .suggestion { color: #aaa; text-align: center; margin-top: 20px; }
        .suggestion-link { color: #58a6ff; cursor: pointer; text-decoration: underline; }

        .pokemon-entry {
            margin-bottom: 60px;
            border-bottom: 1px solid #222;
            padding-bottom: 40px;
        }
        .header-layout {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .image-box {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
            image-rendering: pixelated;
        }
        .header-info {
            flex: 1;
            min-width: 250px;
        }
        .pokemon-name {
            font-size: 24px;
            color: #fff;
            margin: 0 0 4px 0;
        }
        .pokemon-category {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .dex-entry {
            font-size: 13px;
            font-style: italic;
            color: #888;
            margin-top: 10px;
            line-height: 1.4;
        }
        .physique-info {
            font-size: 13px;
            color: #ccc;
            margin-top: 8px;
        }
        .external-links {
            font-size: 13px;
            color: #555;
            margin-top: 8px;
        }
        .external-links a { color: #58a6ff; text-decoration: none; }
        .external-links a:hover { text-decoration: underline; }
        
        .type-label {
            font-weight: bold;
            margin-top: 20px;
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .type-badge {
            display: inline-block;
            margin-right: 10px;
            margin-top: 5px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
        }

        .ability-link {
            color: #58a6ff;
            text-decoration: none;
            margin-right: 10px;
            font-size: 14px;
            display: inline-block;
            margin-top: 5px;
        }
        .ability-link:hover { text-decoration: underline; }

        .stats-toggle {
            color: #58a6ff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 14px;
            display: inline-block;
            margin-top: 25px;
        }
        .stats-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        .stat-item span {
            display: block;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-item strong {
            color: #fff;
            font-size: 16px;
        }

        .t-Normal { color: #A8A77A; } .t-Fire { color: #EE8130; } .t-Water { color: #6390F0; }
        .t-Electric { color: #F7D02C; } .t-Grass { color: #7AC74C; } .t-Ice { color: #96D9D6; }
        .t-Fighting { color: #C22E28; } .t-Poison { color: #A33EA1; } .t-Ground { color: #E2BF65; }
        .t-Flying { color: #A98FF3; } .t-Psychic { color: #F95587; } .t-Bug { color: #A6B91A; }
        .t-Rock { color: #B6A136; } .t-Ghost { color: #735797; } .t-Dragon { color: #6F35FC; }
        .t-Dark { color: #705848; } .t-Steel { color: #B7B7CE; } .t-Fairy { color: #D685AD; }

        .disclaimer {
            margin-top: 50px;
            font-size: 12px;
            color: #555;
            text-align: center;
            line-height: 1.6;
        }
        /* PokéAPI Link immer blau machen */
        .disclaimer a[href*="pokeapi.co"] {
            color: #58a6ff !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 onclick="location.reload()">Vextoly Pokécheck</h1>
        <p class="description">Analysiere die Typen-Effektivität und Daten von Pokémon schnell und präzise.</p>
        
        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="searchInput" placeholder="Name oder Nummer tippen..." autofocus autocomplete="off">
                <div id="suggestionsBox" class="suggestions-box"></div>
            </div>
            <button id="searchBtn">Suchen</button>
        </div>
        <div id="results"></div>
        
        <div class="disclaimer">
            Hinweis: Fähigkeiten wie "Schwebe" können die Typen-Effektivität beeinflussen. <br>
            Diese werden in der statischen Berechnung nicht berücksichtigt.
            <br><br>
            Dieses Projekt wäre nicht ohne <a href="https://pokeapi.co/" target="_blank">PokéAPI</a> möglich gewesen.
        </div>
    </div>

    <script>
        let pokemonList = [];
        let currentSuggestions = [];
        let abilityMap = {};

        const typeDe = {
            Normal: "Normal", Fire: "Feuer", Water: "Wasser", Electric: "Elektro", 
            Grass: "Pflanze", Ice: "Eis", Fighting: "Kampf", Poison: "Gift", 
            Ground: "Boden", Flying: "Flug", Psychic: "Psycho", Bug: "Käfer", 
            Rock: "Gestein", Ghost: "Geist", Dragon: "Drache", Dark: "Unlicht", 
            Steel: "Stahl", Fairy: "Fee"
        };
        
        const typeToBisa = {
            Normal: "normal", Fire: "feuer", Water: "wasser", Electric: "elektro", 
            Grass: "pflanze", Ice: "eis", Fighting: "kampf", Poison: "gift", 
            Ground: "boden", Flying: "flug", Psychic: "psycho", Bug: "kaefer", 
            Rock: "gestein", Ghost: "geist", Dragon: "drache", Dark: "unlicht", 
            Steel: "stahl", Fairy: "fee"
        };

        const apiToInternal = {
            normal: "Normal", fire: "Fire", water: "Water", electric: "Electric",
            grass: "Grass", ice: "Ice", fighting: "Fighting", poison: "Poison",
            ground: "Ground", flying: "Flying", psychic: "Psychic", bug: "Bug",
            rock: "Rock", ghost: "Ghost", dragon: "Dragon", dark: "Dark",
            steel: "Steel", fairy: "Fairy"
        };

        const allTypes = Object.keys(typeDe);

        const chart = {
            Normal: { Rock: 0.5, Ghost: 0, Steel: 0.5 }, Fire: { Fire: 0.5, Water: 0.5, Grass: 2, Ice: 2, Bug: 2, Rock: 0.5, Dragon: 0.5, Steel: 2 },
            Water: { Fire: 2, Water: 0.5, Grass: 0.5, Ground: 2, Rock: 2, Dragon: 0.5 }, Electric: { Water: 2, Electric: 0.5, Grass: 0.5, Ground: 0, Flying: 2, Dragon: 0.5 },
            Grass: { Fire: 0.5, Water: 2, Grass: 0.5, Poison: 0.5, Ground: 2, Flying: 0.5, Bug: 0.5, Rock: 2, Dragon: 0.5, Steel: 0.5 }, Ice: { Fire: 0.5, Water: 0.5, Grass: 2, Ice: 0.5, Ground: 2, Flying: 2, Dragon: 2, Steel: 0.5 },
            Fighting: { Normal: 2, Ice: 2, Poison: 0.5, Flying: 0.5, Psychic: 0.5, Bug: 0.5, Rock: 2, Ghost: 0, Dark: 2, Steel: 2, Fairy: 0.5 }, Poison: { Grass: 2, Poison: 0.5, Ground: 0.5, Rock: 0.5, Ghost: 0.5, Steel: 0, Fairy: 2 },
            Ground: { Fire: 2, Water: 0.5, Electric: 2, Grass: 0.5, Poison: 2, Flying: 0, Bug: 0.5, Rock: 2, Steel: 2 }, Flying: { Electric: 0.5, Grass: 2, Fighting: 2, Bug: 2, Rock: 0.5, Steel: 0.5 },
            Psychic: { Fighting: 2, Poison: 2, Psychic: 0.5, Dark: 0, Steel: 0.5 }, Bug: { Fire: 0.5, Grass: 2, Fighting: 0.5, Poison: 0.5, Flying: 0.5, Psychic: 2, Ghost: 0.5, Dark: 2, Steel: 0.5, Fairy: 0.5 },
            Rock: { Fire: 2, Ice: 2, Fighting: 0.5, Ground: 0.5, Flying: 2, Bug: 2, Steel: 0.5 }, Ghost: { Normal: 0, Psychic: 2, Ghost: 2, Dark: 0.5 },
            Dragon: { Dragon: 2, Steel: 0.5, Fairy: 0 }, Dark: { Fighting: 0.5, Psychic: 2, Ghost: 2, Dark: 0.5, Fairy: 0.5 },
            Steel: { Fire: 0.5, Water: 0.5, Electric: 0.5, Ice: 2, Rock: 2, Steel: 0.5, Fairy: 2 }, Fairy: { Fire: 0.5, Fighting: 2, Poison: 0.5, Dragon: 2, Dark: 2, Steel: 0.5 }
        };

        async function fetchPokeAPI(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                return data;
            } catch (e) {
                return null;
            }
        }

        function getLevenshteinDist(s, t) {
            const d = [];
            const n = s.length; const m = t.length;
            if (n === 0) return m; if (m === 0) return n;
            for (let i = 0; i <= n; i++) d[i] = [i];
            for (let j = 0; j <= m; j++) d[0][j] = j;
            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    const cost = s[i - 1] === t[j - 1] ? 0 : 1;
                    d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + cost);
                }
            }
            return d[n][m];
        }

        async function init() {
            try {
                const [rEn, rDe, rAb] = await Promise.all([
                    fetch('https://vextoly.link/pokecheck/listb.txt'),
                    fetch('https://vextoly.link/pokecheck/listde.txt'),
                    fetch('https://vextoly.link/pokecheck/ability.txt')
                ]);
                const txtEn = await rEn.text();
                const txtDe = await rDe.text();
                const txtAb = await rAb.text();
                
                txtAb.split('\n').forEach(line => {
                    const parts = line.split(':');
                    if(parts.length === 2) abilityMap[parts[0].trim().toLowerCase()] = parts[1].trim();
                });

                const deNamesMap = {};
                txtDe.split('\n').forEach((name, idx) => {
                    const cleanName = name.trim();
                    if(cleanName) {
                        const numStr = (idx + 1).toString().padStart(3, '0');
                        deNamesMap[numStr] = cleanName;
                    }
                });

                txtEn.split('\n').slice(1).forEach((line) => {
                    const p = line.trim().split(/\t+|\s{2,}/).filter(val => val.trim() !== '');
                    
                    if (p.length >= 3) {
                        const pNum = p[0].padStart(3, '0');
                        let obj = { 
                            num: pNum, 
                            name: p[1], 
                            nameDe: deNamesMap[pNum] || "" 
                        };
                        
                        const hasStats = p.length >= 8 && !isNaN(p[p.length - 1]);
                        const len = p.length;
                        const statsStart = hasStats ? len - 6 : len;
                        const middle = p.slice(2, statsStart);
                        
                        if (middle.length > 0) {
                            if (allTypes.includes(middle[0])) { 
                                obj.t1 = middle[0]; 
                                obj.t2 = middle[1] || null; 
                            } else { 
                                obj.form = middle[0]; 
                                obj.t1 = middle[1]; 
                                obj.t2 = middle[2] || null; 
                            }
                        }

                        if (hasStats) {
                            obj.stats = {
                                hp: p[len - 6], atk: p[len - 5], def: p[len - 4],
                                spAtk: p[len - 3], spDef: p[len - 2], spe: p[len - 1]
                            };
                        }
                        pokemonList.push(obj);
                    }
                });
            } catch (e) { console.error("Datenfehler beim Laden der Liste."); }
        }

        function getEff(t1, t2) {
            let res = { 4:[], 2:[], 1:[], 0.5:[], 0.25:[], 0:[] };
            allTypes.forEach(atk => {
                let m = (chart[atk][t1] ?? 1) * (t2 ? (chart[atk][t2] ?? 1) : 1);
                res[m].push(atk);
            });
            return res;
        }

        function toggleStats(btn) {
            const box = btn.nextElementSibling;
            if (box.style.display === 'none') {
                box.style.display = 'grid';
                btn.textContent = 'Basispunkte verstecken';
            } else {
                box.style.display = 'none';
                btn.textContent = 'Basispunkte anzeigen';
            }
        }

        function getTypeBadgeHtml(typeKey) {
            const germanName = typeDe[typeKey];
            const bisaSlug = typeToBisa[typeKey];
            return `<a href="https://www.bisafans.de/typendex/${bisaSlug}.php" target="_blank" class="type-badge t-${typeKey}">${germanName}</a>`;
        }

        async function renderResults(results) {
            const container = document.getElementById('results');
            container.innerHTML = '<p class="suggestion">Lade Daten aus der PokeAPI...</p>';
            
            const entriesHtml = await Promise.all(results.map(async p => {
                const pokeId = parseInt(p.num);
                const pokeData = await fetchPokeAPI(`https://pokeapi.co/api/v2/pokemon/${pokeId}`);
                
                let speciesData = null;
                if (pokeData && pokeData.species) {
                    speciesData = await fetchPokeAPI(pokeData.species.url);
                }

                const apiAbilities = pokeData ? pokeData.abilities : [];
                
                // Änderung: Nutze Gen 5 Sprites (Black/White) als Standard
                const imgUrl = pokeData?.sprites?.versions['generation-v']?.['black-white']?.front_default || pokeData?.sprites?.front_default || '';
                
                const height = pokeData ? (pokeData.height / 10).toFixed(1) + ' m' : '?';
                const weight = pokeData ? (pokeData.weight / 10).toFixed(1) + ' kg' : '?';
                const baseExp = pokeData ? pokeData.base_experience : '?';

                let t1 = p.t1;
                let t2 = p.t2;
                if (pokeData && pokeData.types) {
                    t1 = apiToInternal[pokeData.types[0].type.name];
                    t2 = pokeData.types[1] ? apiToInternal[pokeData.types[1].type.name] : null;
                }

                const eff = getEff(t1, t2);

                let dexEntry = '';
                let category = '';
                if (speciesData) {
                    const deEntry = speciesData.flavor_text_entries.find(e => e.language.name === 'de');
                    if (deEntry) dexEntry = deEntry.flavor_text.replace(/[\n\f\r]/g, ' ');
                    const deGenus = speciesData.genera.find(g => g.language.name === 'de');
                    if (deGenus) category = deGenus.genus;
                }

                let html = `<div class="pokemon-entry">
                                <div class="header-layout">`;
                
                if (imgUrl) {
                    html += `       <div class="image-box"><img src="${imgUrl}" alt="${p.name}"></div>`;
                }

                html += `             <div class="header-info">
                                           <h2 class="pokemon-name">#${p.num} ${p.name} ${p.form ? `(${p.form})` : ''}</h2>`;
                if(category) html += `   <div class="pokemon-category">${category}</div>`;
                
                html += `                 <div class="physique-info">
                                             <strong>Größe:</strong> ${height} | <strong>Gewicht:</strong> ${weight} | <strong>Basis-EP:</strong> ${baseExp}
                                         </div>`;

                if(dexEntry) html += `   <div class="dex-entry">"${dexEntry}"</div>`;

                html += `                 <div class="external-links">
                                             <a href="https://www.bisafans.de/pokedex/${p.num}.php" target="_blank">Zu Bisafans</a> 
                                             | 
                                             <a href="https://www.smogon.com/dex/sv/pokemon/${p.name.toLowerCase()}" target="_blank">Zu Smogon.com</a>
                                         </div>
                                    </div>
                                </div>`;
                
                html += `<span class="type-label">Typ:</span> ${getTypeBadgeHtml(t1)}`;
                if(t2) html += getTypeBadgeHtml(t2);

                if(apiAbilities.length > 0) {
                    html += `<span class="type-label">Mögliche Fähigkeiten:</span>`;
                    apiAbilities.forEach(a => {
                        const enName = a.ability.name.replace('-', ' ');
                        const deName = abilityMap[enName.toLowerCase()] || enName;
                        const hiddenSuffix = a.is_hidden ? ' (VF)' : '';
                        const urlName = deName.toLowerCase().replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss');
                        html += `<a href="https://www.bisafans.de/faehigkeitendex/${urlName}.php" target="_blank" class="ability-link">${deName}${hiddenSuffix}</a>`;
                    });
                }
                
                [{val:4,l:"4x Effektiv"}, {val:2,l:"2x Effektiv"}, {val:1,l:"Normal"}, {val:0.5,l:"0.5x Resistent"}, {val:0.25,l:"0.25x Resistent"}, {val:0,l:"Immun"}].forEach(c => {
                    if(eff[c.val].length > 0) {
                        html += `<span class="type-label">${c.l}:</span>`;
                        eff[c.val].forEach(t => html += getTypeBadgeHtml(t));
                    }
                });

                if (p.stats) {
                    html += `
                        <div>
                            <span class="stats-toggle" onclick="toggleStats(this)">Basispunkte anzeigen</span>
                            <div class="stats-box" style="display: none;">
                                <div class="stat-item"><span>KP</span><strong>${p.stats.hp}</strong></div>
                                <div class="stat-item"><span>Angriff</span><strong>${p.stats.atk}</strong></div>
                                <div class="stat-item"><span>Vert.</span><strong>${p.stats.def}</strong></div>
                                <div class="stat-item"><span>Sp.-Angr.</span><strong>${p.stats.spAtk}</strong></div>
                                <div class="stat-item"><span>Sp.-Vert.</span><strong>${p.stats.spDef}</strong></div>
                                <div class="stat-item"><span>Initiative</span><strong>${p.stats.spe}</strong></div>
                            </div>
                        </div>
                    `;
                }

                html += `</div>`;
                return html;
            }));

            container.innerHTML = entriesHtml.join('');
        }

        function search(overrideQuery = null) {
            const searchInput = document.getElementById('searchInput');
            const suggestionsBox = document.getElementById('suggestionsBox');
            const inputVal = overrideQuery || searchInput.value.trim();
            const q = inputVal.toLowerCase();
            const container = document.getElementById('results');
            
            searchInput.value = '';
            suggestionsBox.style.display = 'none';
            currentSuggestions = [];

            if(!q) return;

            let exactResults = pokemonList.filter(p => p.name.toLowerCase() === q);
            if (exactResults.length === 0) {
                exactResults = pokemonList.filter(p => p.nameDe && p.nameDe.toLowerCase() === q);
            }
            if (exactResults.length === 0) {
                const searchNum = q.padStart(3, '0');
                exactResults = pokemonList.filter(p => p.num === searchNum);
            }
            
            if (exactResults.length > 0) {
                renderResults(exactResults);
            } else {
                let bestMatch = null;
                let minDist = 3;

                pokemonList.forEach(p => {
                    const d = getLevenshteinDist(q, p.name.toLowerCase());
                    if (d < minDist) {
                        minDist = d;
                        bestMatch = p.name;
                    }
                });

                if (bestMatch) {
                    container.innerHTML = `<p class="suggestion">Pokémon nicht gefunden. Meintest du <span class="suggestion-link" onclick="search('${bestMatch}')">${bestMatch}</span>?</p>`;
                } else {
                    container.innerHTML = `<p class="error-msg">Pokémon konnte nicht gefunden werden. Bitte überprüfe die Schreibweise.</p>`;
                }
            }
        }

        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestionsBox');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            suggestionsBox.innerHTML = '';
            currentSuggestions = [];

            if (!val) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const matches = [];
            const seenNames = new Set();

            for (let i = 0; i < pokemonList.length; i++) {
                const p = pokemonList[i];
                if (!seenNames.has(p.name)) {
                    if (p.name.toLowerCase().includes(val) || p.num.includes(val)) {
                        matches.push({ name: p.name, num: p.num });
                        seenNames.add(p.name);
                    }
                }
                if (matches.length >= 6) break;
            }

            if (matches.length > 0) {
                currentSuggestions = matches;
                matches.forEach((match, index) => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    if (index === 0) div.classList.add('active');
                    div.innerHTML = `<span>${match.name}</span> <span class="suggestion-num">#${match.num}</span>`;
                    div.onmousedown = (e) => {
                        e.preventDefault();
                        search(match.name);
                    };
                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        searchInput.addEventListener('blur', () => {
            suggestionsBox.style.display = 'none';
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (suggestionsBox.style.display === 'block' && currentSuggestions.length > 0) {
                    search(currentSuggestions[0].name);
                } else {
                    search();
                }
            } else if (e.key === 'Tab') {
                if (suggestionsBox.style.display === 'block' && currentSuggestions.length > 0) {
                    e.preventDefault();
                    search(currentSuggestions[0].name);
                }
            }
        });

        document.getElementById('searchBtn').addEventListener('mousedown', (e) => {
            e.preventDefault();
            search();
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement !== searchInput && e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
                searchInput.focus();
            }
        });

        init();
    </script>
</body>
</html>
